spring:
  application:
    name: premisave-listing-service
  data:
    mongodb:
      uri: mongodb://localhost:27017/premisave-listing
  redis:
    host: localhost
    port: 6379
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB

server:
  port: 8082

# Auth Service
auth:
  service:
    url: http://localhost:8080

# JWT
jwt:
  secret: eW91ci12ZXJ5LXNlY3VyZS1qd3Qtc2VjcmV0LWtleS0zMi1ieXRlcyE=

# Cloudinary
cloudinary:
  cloud-name: thepeacemakersllc
  api-key: 929659223288334
  api-secret: nAsBdgfXx86u7-Y8X2VnLa-2FbQ

# Rate Limiting
rate-limit:
  requests-per-minute: 100

# Ad Promotion
ad:
  promotion:
    daily-rate: 299
    default-currency: KES

# ====================== M-PESA DARAJA CONFIG ======================
mpesa:
  daraja:
    consumer-key: ${MPESA_CONSUMER_KEY:your_consumer_key_here}
    consumer-secret: ${MPESA_CONSUMER_SECRET:your_consumer_secret_here}
    shortcode: ${MPESA_SHORTCODE:174379}
    passkey: ${MPESA_PASSKEY:your_passkey_here}
    callback-url: ${MPESA_CALLBACK_URL:http://localhost:8082/api/payments/mpesa/callback}
    confirmation-url: ${MPESA_CONFIRMATION_URL:http://localhost:8082/api/payments/mpesa/confirmation}
    validation-url: ${MPESA_VALIDATION_URL:http://localhost:8082/api/payments/mpesa/validation}
    environment: sandbox

# ====================== FRANKFURTER CURRENCY API ======================
# Free, open-source, no API key required.
# Override only if self-hosting Frankfurter.
frankfurter:
  base-url: ${FRANKFURTER_BASE_URL:https://api.frankfurter.dev}

frontend:
  url: http://localhost:3000

logging:
  level:
    com.premisave: DEBUG