spring:
  application:
    name: premisave-listing-service

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/premisave-listing}
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      repositories:
        enabled: false  # Prevents Redis from claiming MongoDB repositories

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB

  cloud:
    discovery:
      enabled: false

# ==================== Server ====================
server:
  port: 8082

# ==================== Auth Service ====================
auth:
  service:
    url: ${AUTH_SERVICE_URL:http://localhost:8080}

# ==================== JWT ====================
jwt:
  secret: ${JWT_SECRET:eW91ci12ZXJ5LXNlY3VyZS1qd3Qtc2VjcmV0LWtleS0zMi1ieXRlcyE=}

# ==================== Cloudinary ====================
cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:thepeacemakersllc}
  api-key: ${CLOUDINARY_API_KEY:929659223288334}
  api-secret: ${CLOUDINARY_API_SECRET:nAsBdgfXx86u7-Y8X2VnLa-2FbQ}

# ==================== Rate Limiting ====================
rate-limit:
  requests-per-minute: 100

# ==================== Ad Promotion ====================
ad:
  promotion:
    daily-rate: 299
    default-currency: KES

# ====================== M-PESA DARAJA CONFIG ======================
# IMPORTANT: The *-url values below MUST be publicly reachable by Safaricom.
# localhost will NOT work in any deployed environment.
# Always set MPESA_CALLBACK_URL, MPESA_CONFIRMATION_URL, and MPESA_VALIDATION_URL
# as environment variables pointing to your live/ngrok/tunnel URL before testing.
#
# Example (ngrok for local dev):
#   MPESA_CALLBACK_URL=https://abc123.ngrok.io/payments/mpesa/callback
#
# Example (production):
#   MPESA_CALLBACK_URL=https://api.premisave.com/payments/mpesa/callback
mpesa:
  daraja:
    consumer-key: ${MPESA_CONSUMER_KEY:your_consumer_key_here}
    consumer-secret: ${MPESA_CONSUMER_SECRET:your_consumer_secret_here}
    shortcode: ${MPESA_SHORTCODE:174379}
    passkey: ${MPESA_PASSKEY:your_passkey_here}
    callback-url: ${MPESA_CALLBACK_URL:https://your-public-domain.com/payments/mpesa/callback}
    confirmation-url: ${MPESA_CONFIRMATION_URL:https://your-public-domain.com/payments/mpesa/confirmation}
    validation-url: ${MPESA_VALIDATION_URL:https://your-public-domain.com/payments/mpesa/validation}
    environment: ${MPESA_ENV:sandbox}

# ====================== FRANKFURTER CURRENCY API ======================
frankfurter:
  base-url: ${FRANKFURTER_BASE_URL:https://api.frankfurter.dev}

# ==================== Frontend ====================
frontend:
  url: ${FRONTEND_URL:http://localhost:3000}

# ==================== Logging ====================
logging:
  level:
    "[com.premisave]": DEBUG
    "[org.springframework.data.mongodb]": WARN
    "[org.springframework.data.repository.config.RepositoryConfigurationExtensionSupport]": ERROR
    "[org.springframework.cloud.commons.util.InetUtils]": ERROR